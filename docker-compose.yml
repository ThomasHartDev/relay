services:
  postgres:
    image: postgres:16-alpine
    container_name: relay-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay_dev
      POSTGRES_DB: relay
    volumes:
      - relay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: relay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - relay-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  relay-postgres-data:
  relay-redis-data:
