name: Claude Code Audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Audit
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-opus-4-6
          direct_prompt: |
            You are auditing the codebase. Relay is a modern CRM with sequence automation, a visual workflow builder using React Flow, and Radix UI components. Built with Next.js 15, Prisma, and PostgreSQL.

            Do a thorough review and create GitHub issues for anything you find. Focus on:
            1. Bugs: broken behavior, race conditions, edge cases
            2. Security: exposed secrets, XSS, injection, unsafe dependencies
            3. Performance: memory leaks, unnecessary work, slow paths
            4. Test gaps: important logic without test coverage
            5. Code quality: dead code, duplicated logic, unclear abstractions
            6. UX improvements: accessibility issues, broken responsive design

            For each issue, use gh issue create with a clear title, description with
            file paths and line numbers, suggested fix, and the claude label.
            Only create issues for real, actionable problems.
          allowed_tools: "Bash,Read,Glob,Grep"
          timeout_minutes: 30
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  market-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Grok Market Research
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(curl -s https://api.x.ai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $XAI_API_KEY" \
            -d '{
              "messages": [
                {"role": "system", "content": "You are a product strategist. Be specific and actionable."},
                {"role": "user", "content": "Relay is a CRM with sequence automation and a visual workflow builder. Suggest 3-5 features based on the SMB CRM market and what would differentiate it from HubSpot/Pipedrive."}
              ],
              "model": "grok-4-latest",
              "stream": false,
              "temperature": 0.7
            }')

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ -n "$CONTENT" ] && [ "$CONTENT" != "null" ]; then
            gh issue create \
              --title "Market Research and Feature Recommendations ($(date +%Y-%m-%d))" \
              --body "$CONTENT" \
              --label "research,enhancement" \
              --repo "ThomasHartDev/relay"
          fi
