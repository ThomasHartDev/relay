name: Claude Issue Handler

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-issue-handler
  cancel-in-progress: false

jobs:
  claude-fix:
    if: >
      (github.event_name == 'issues' && (github.event.action == 'opened' || (github.event.action == 'labeled' && github.event.label.name == 'claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          direct_prompt: |
            Read this GitHub issue and fix it:

            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}
            Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}

            CRITICAL: You MUST verify issues in a real browser before making changes.
            Do NOT assume code is broken just from reading it.

            1. Start the dev server: `pnpm dev &` and wait for it to be ready
            2. Write a Playwright script to reproduce the issue:
               node -e "const { chromium } = require('playwright'); (async () => { const browser = await chromium.launch(); const page = await browser.newPage(); await page.goto('http://localhost:3000'); /* test the issue */ await browser.close(); })();"
            3. If the bug does NOT reproduce, comment saying it works correctly. Do NOT make changes.
            4. If confirmed, fix it minimally, then verify the fix with Playwright
            5. Run all tests, typecheck, and lint
            6. Create a PR only if all checks pass, including what you tested
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          timeout_minutes: 30
